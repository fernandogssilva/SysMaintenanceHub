<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="60%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ícone: escudo estilizado com pulso vital dentro -->
  <g transform="translate(20,20)">
    <!-- shield outline -->
    <path d="M 80 5 L 155 30 L 150 100 Q 145 130 80 155 Q 15 130 10 100 L 5 30 Z"
          fill="url(#grad)" opacity="0.15"/>
    <path d="M 80 5 L 155 30 L 150 100 Q 145 130 80 155 Q 15 130 10 100 L 5 30 Z"
          fill="none" stroke="url(#grad)" stroke-width="4" stroke-linejoin="round"/>

    <!-- pulse line through shield -->
    <polyline
      points="20,90 45,90 55,60 68,120 82,50 96,120 108,80 138,80"
      fill="none" stroke="url(#pulseGrad)" stroke-width="5"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#glow)"/>

    <!-- "W" mark subtle behind pulse -->
    <text x="80" y="102" font-family="Segoe UI, sans-serif" font-weight="900"
          font-size="88" text-anchor="middle" fill="url(#grad)" opacity="0.08">W</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(200,0)">
    <text x="0" y="115" font-family="Segoe UI, Inter, sans-serif" font-weight="800"
          font-size="86" fill="url(#grad)" letter-spacing="-3">Wintal</text>
    <text x="4" y="150" font-family="Segoe UI, Inter, sans-serif" font-weight="500"
          font-size="18" fill="#94A3B8" letter-spacing="1">
      A saúde do seu Windows, sem complicação.
    </text>
  </g>
</svg>
